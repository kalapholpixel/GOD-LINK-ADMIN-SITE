# HTTPS-first Nginx template for admin-api.yourdomain.com
#
# Behavior:
# - Redirects HTTP to HTTPS
# - Protects admin UI and save endpoints with Basic Auth
# - Leaves read endpoints (/api/data, /api/events) public for client-site consumption
#
# Prereq:
# sudo apt-get install -y apache2-utils
# sudo htpasswd -c /etc/nginx/.htpasswd-admin <admin-username>

server {
    listen 80;
    listen [::]:80;
    server_name admin-api.yourdomain.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin-api.yourdomain.com;

    # Replace these with your certificate paths (or use certbot --nginx)
    ssl_certificate /etc/letsencrypt/live/admin-api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-api.yourdomain.com/privkey.pem;

    client_max_body_size 10m;

    # Default: require login for admin UI pages
    auth_basic "Restricted Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-admin;

    # Public read endpoints for client site
    location = /api/data {
        auth_basic off;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/events {
        auth_basic off;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        add_header X-Accel-Buffering no;
    }

    # Keep save/auth endpoints protected
    location = /api/auth/verify {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /save {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI + everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
